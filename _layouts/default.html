<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <title>{{ page.title }} - {{ site.title }}</title>
    <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
  </head>
  <body>
    <button id="theme-toggle" aria-label="Switch theme">☾</button>
    <button id="anim-toggle" aria-pressed="false">Animations: on</button>
    {% include menu.html %}
    {{ content }}

    <script src="{{ "/assets/js/main.js" | relative_url }}"></script>
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer
        src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script>
      // Render math from kramdown's <script type="math/tex"> tags.
      // This does NOT depend on $$ delimiters surviving Markdown, so it is
      // robust to how Obsidian/kramdown space and reflow the source.
      window.addEventListener('DOMContentLoaded', function () {
        function renderAll() {
          if (typeof katex === 'undefined') { setTimeout(renderAll, 50); return; }
          var nodes = document.querySelectorAll('script[type^="math/tex"]');
          nodes.forEach(function (node) {
            var display = node.type.indexOf('mode=display') !== -1;
            var tex = node.textContent;
            var span = document.createElement('span');
            try {
              katex.render(tex, span, { displayMode: display, throwOnError: false, strict: false });
            } catch (e) {
              span.textContent = tex;
            }
            node.parentNode.replaceChild(span, node);
          });
        }
        renderAll();
      });
    </script>
  </body>
</html>
